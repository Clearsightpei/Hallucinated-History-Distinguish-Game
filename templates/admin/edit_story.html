<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Story - Truth or Hoax</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container py-5">
        <!-- Admin Header -->
        <header class="text-center mb-5">
            <h1 class="display-4">
                <i class="fas fa-edit me-2"></i> Edit Story
            </h1>
            <p class="lead">{{ story.event }} ({{ story.id }})</p>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i> Back to Dashboard
            </a>
        </header>
        
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <!-- Story Form -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Story Details</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('edit_story', story_id=story.id) }}" method="post">
                    <div class="mb-3">
                        <label for="event" class="form-label">Event Title</label>
                        <input type="text" class="form-control" id="event" name="event" value="{{ story.event }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="true_version" class="form-label">True Version</label>
                        <textarea class="form-control" id="true_version" name="true_version" rows="5" required>{{ story.true_version }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="fake_version" class="form-label">Fake Version</label>
                        <textarea class="form-control" id="fake_version" name="fake_version" rows="5" required>{{ story.fake_version }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="explanation" class="form-label">Explanation</label>
                        <textarea class="form-control" id="explanation" name="explanation" rows="3" required>{{ story.explanation }}</textarea>
                    </div>
                    
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i> Update Story
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
